<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vox Testing</title>
</head>
<body>
  <h1>Vox Test</h1>

  <section>
    <h2>Reactive variable</h2>
    <p>Nume: <span vox-variable="name"></span></p>
  </section>

  <section>
    <h2>Input binding</h2>
    <input type="text" vox-value="name" placeholder="Scrie un nume" />
  </section>

  <section>
    <h2>Conditional rendering</h2>
    <button vox-on:click="toggleVisible">Toggle visible</button>

    <div vox-if="isVisible">
      <p>Acest text apare doar când <strong>isVisible</strong> este true.</p>
    </div>
  </section>

  <section>
    <h2>List rendering</h2>
    <button vox-on:click="addItem">Add item</button>

    <ul>
      <li vox-for-each="item in items">
        <span vox-variable="item"></span>
      </li>
    </ul>
  </section>

  <section>
    <h2>Template</h2>
    <div vox-template="./template.html"></div>
  </section>

  <script type="module" src="./testing.js"></script>
</body>
</html>
